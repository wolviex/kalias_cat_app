name: kalias
description: "Kalia's Cat App — educational emotional wellness app for kids ages 4-8."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Game engine
  flame: ^1.21.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local persistence
  hive_ce: ^2.9.0
  hive_ce_flutter: ^2.3.4

  # Navigation
  go_router: ^14.8.1

  # Audio
  flame_audio: ^2.10.2

  # Utils
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5
  hive_ce_generator: ^1.8.0
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/characters/
    - assets/backgrounds/
    - assets/ui/
    - assets/audio/sfx/
    - assets/audio/music/
    - assets/data/
